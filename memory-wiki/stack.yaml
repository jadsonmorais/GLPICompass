consultas_personalizadas:
  # Cada entrada expõe uma SQL pré-cadastrada no plugin utilsdashboards.
  # O token real fica em .env (GLPI_QUERY_TOKEN_*) — aqui só a referência.
  # Endpoint: ${GLPI_DASHBOARDS_BASE_URL}?token=<token>
  - nome: "Chamados Aguardando Retorno"
    descricao: "Última interação (followup ou task) de cada chamado em aberto foi feita por um REQUERENTE (!usercategories_id=20). A bola está com o TIME DA TI. Cobre o cruzamento glpi_itilfollowups + glpi_tickettasks que /search/Ticket não faz."
    colunas: ["id", "Ticket", "date", "users_id", "date_mod", "date_creation", "content", "tipo"]
    token_env: "GLPI_QUERY_TOKEN_AGUARDANDO_RETORNO"

  - nome: "Linha do Tempo de Interações de Chamados Abertos"
    descricao: "Retorna todos os followups e tasks de chamados abertos para análise cronológica."
    colunas: ["id", "Ticket", "date", "users_id", "content", "tipo"]
    token_env: "GLPI_QUERY_TOKEN_ACOMPANHAMENTOS"

  - nome: "Linha do Tempo de Interações de Problemas"
    descricao: "Retorna todos os followups e tasks de problemas abertos para análise cronológica."
    colunas: ["id", "Ticket", "date", "users_id", "content", "tipo"]
    token_env: "GLPI_QUERY_TOKEN_ACOMPANHAMENTOS_PROBLEMAS" 

  - nome: "Linha do Tempo de Interações de Mudanças"
    descricao: "Retorna todos os followups e tasks de mudanças abertas para análise cronológica."
    colunas: ["id", "Ticket", "date", "users_id", "content", "tipo"]
    token_env: "GLPI_QUERY_TOKEN_ACOMPANHAMENTOS_MUDANCAS"

  - nome: "Problemas"
    descricao: "Lista de problemas , para acompanhamento e priorização."
    colunas: ["id", "name", "status", "date_creation", "content", "solve_date", "close_date", "time_to_resolve", "itilcategories_id", "date_mod", "users_id_recipient", "urgency", "impact", "priority", "impactcontent", "causecontent", "symptomcontent", "locations_id"]
    token_env: "GLPI_QUERY_TOKEN_PROBLEMAS"

  - nome: "Mudanças"
    descricao: "Lista de mudanças , para acompanhamento e priorização."
    colunas: ["id", "name", "status", "date_creation", "content", "close_date", "date_mod", "users_id_recipient", "urgency", "impact", "priority", "impactcontent", "causecontent", "symptomcontent"]
    token_env: "GLPI_QUERY_TOKEN_MUDANCAS"

  - nome: "Chamados com Etiquetas inconsistentes"
    descricao: "Chamados não solucionados com etiquetas inconsistentes, filtrar pelo motivo de inconsistência, a coluna motivo explica qual a questão."
    colunas: ["ticket_id", "tag_count" , "tags", "motivo_id", "motivo"]
    token_env: "GLPI_QUERY_TOKEN_ETIQUETAS_INCONSISTENTES"

convencoes:
  idioma_padrao_respostas: pt-BR
  fuso_horario: America/Fortaleza
