<!-- Archetype: KPI Cards — linha de 3-4 KPIs no topo da página. -->
<!-- Use para destacar números resumo: total de chamados, % SLA em risco, idade média, etc. -->
<!-- Substitua os placeholders {{...}} por dados reais. -->

<section class="kpi-row" style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:16px">
  <div class="kpi" style="background:#fff;border-radius:8px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.08)">
    <div style="font-size:12px;color:#6b7280;text-transform:uppercase;letter-spacing:.5px">Total em aberto</div>
    <div style="font-size:32px;font-weight:600;color:#1f2937;margin-top:4px">{{KPI_TOTAL}}</div>
    <div style="font-size:12px;color:#6b7280;margin-top:4px">{{KPI_TOTAL_DELTA}}</div>
  </div>
  <div class="kpi" style="background:#fff;border-radius:8px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.08);border-left:4px solid #cc0000">
    <div style="font-size:12px;color:#6b7280;text-transform:uppercase;letter-spacing:.5px">SLA em risco</div>
    <div style="font-size:32px;font-weight:600;color:#cc0000;margin-top:4px">{{KPI_SLA_RISK}}</div>
    <div style="font-size:12px;color:#6b7280;margin-top:4px">{{KPI_SLA_LABEL}}</div>
  </div>
  <div class="kpi" style="background:#fff;border-radius:8px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.08)">
    <div style="font-size:12px;color:#6b7280;text-transform:uppercase;letter-spacing:.5px">Idade média</div>
    <div style="font-size:32px;font-weight:600;color:#1f2937;margin-top:4px">{{KPI_AGE}}</div>
    <div style="font-size:12px;color:#6b7280;margin-top:4px">dias</div>
  </div>
  <div class="kpi" style="background:#fff;border-radius:8px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.08);border-left:4px solid #6aa84f">
    <div style="font-size:12px;color:#6b7280;text-transform:uppercase;letter-spacing:.5px">Solucionados (mês)</div>
    <div style="font-size:32px;font-weight:600;color:#6aa84f;margin-top:4px">{{KPI_SOLVED}}</div>
    <div style="font-size:12px;color:#6b7280;margin-top:4px">{{KPI_SOLVED_DELTA}}</div>
  </div>
</section>
