<!-- Archetype: Top-N Bar Chart horizontal — ranking por grupo, fornecedor, etiqueta, técnico. -->
<!-- Use para responder "quais X têm mais Y": grupos com mais chamados, fornecedores em fila, etc. -->

<div class="card" style="background:#fff;border-radius:8px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.08);grid-column:span 6">
  <div style="font-size:14px;font-weight:600;color:#1f2937;margin-bottom:12px">{{TITULO_PAINEL}}</div>
  <div id="{{CHART_ID}}" style="width:100%;height:320px"></div>
</div>

<script>
(function() {
  const el = document.getElementById('{{CHART_ID}}');
  const chart = echarts.init(el);
  chart.setOption({
    grid: { top: 8, right: 24, bottom: 24, left: 120 },
    xAxis: { type: 'value', axisLabel: { color: '#6b7280' } },
    yAxis: {
      type: 'category',
      data: {{Y_LABELS_JSON}}, // ex: ["N1","N2-Infra","N2-Sistemas"]
      axisLabel: { color: '#1f2937' }
    },
    tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
    series: [{
      type: 'bar',
      data: {{X_VALUES_JSON}}, // ex: [12, 8, 5]
      itemStyle: { color: '#0b5394', borderRadius: [0, 4, 4, 0] },
      label: { show: true, position: 'right', color: '#1f2937' }
    }]
  });
  window.addEventListener('resize', () => chart.resize());
})();
</script>
