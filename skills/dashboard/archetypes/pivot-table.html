<!-- Archetype: Pivot Table — tabela densa, mesmo formato das listagens do chat. -->
<!-- Use pra detalhe linha-a-linha quando o briefing pede "lista", "tabela", "pivot por X". -->

<div class="card" style="background:#fff;border-radius:8px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.08);grid-column:span 12">
  <div style="font-size:14px;font-weight:600;color:#1f2937;margin-bottom:12px">{{TITULO_PAINEL}}</div>
  <div style="overflow-x:auto">
    <table style="width:100%;border-collapse:collapse;font-size:13px">
      <thead>
        <tr style="background:#f5f7fa;text-align:left">
          <th style="padding:8px 12px;color:#6b7280;font-weight:600;border-bottom:1px solid #e5e7eb">ID</th>
          <th style="padding:8px 12px;color:#6b7280;font-weight:600;border-bottom:1px solid #e5e7eb">Título</th>
          <th style="padding:8px 12px;color:#6b7280;font-weight:600;border-bottom:1px solid #e5e7eb">Prio</th>
          <th style="padding:8px 12px;color:#6b7280;font-weight:600;border-bottom:1px solid #e5e7eb">Idade</th>
          <th style="padding:8px 12px;color:#6b7280;font-weight:600;border-bottom:1px solid #e5e7eb">Grupo</th>
          <th style="padding:8px 12px;color:#6b7280;font-weight:600;border-bottom:1px solid #e5e7eb">SLA</th>
        </tr>
      </thead>
      <tbody>
        <!-- Repita uma <tr> por linha. Use cor #cc0000 no SLA quando "em risco". -->
        <tr>
          <td style="padding:8px 12px;border-bottom:1px solid #f3f4f6">{{ROW_ID}}</td>
          <td style="padding:8px 12px;border-bottom:1px solid #f3f4f6">{{ROW_TITULO}}</td>
          <td style="padding:8px 12px;border-bottom:1px solid #f3f4f6"><span style="background:#0b5394;color:#fff;padding:2px 8px;border-radius:4px;font-size:11px">{{ROW_PRIO}}</span></td>
          <td style="padding:8px 12px;border-bottom:1px solid #f3f4f6">{{ROW_IDADE}}</td>
          <td style="padding:8px 12px;border-bottom:1px solid #f3f4f6">{{ROW_GRUPO}}</td>
          <td style="padding:8px 12px;border-bottom:1px solid #f3f4f6;color:#cc0000">{{ROW_SLA}}</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
