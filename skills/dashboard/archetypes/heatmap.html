<!-- Archetype: Heatmap â€” matriz urgĂŞnciaĂ—impacto, ou horaĂ—dia da semana. -->
<!-- Excelente pra mostrar concentraĂ§ĂŁo: onde estĂˇ a maior pressĂŁo? -->

<div class="card" style="background:#fff;border-radius:8px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.08);grid-column:span 6">
  <div style="font-size:14px;font-weight:600;color:#1f2937;margin-bottom:12px">{{TITULO_PAINEL}}</div>
  <div id="{{CHART_ID}}" style="width:100%;height:320px"></div>
</div>

<script>
(function() {
  const el = document.getElementById('{{CHART_ID}}');
  const chart = echarts.init(el);
  chart.setOption({
    grid: { top: 32, right: 24, bottom: 64, left: 80, containLabel: true },
    tooltip: { position: 'top' },
    xAxis: {
      type: 'category',
      data: {{X_LABELS_JSON}}, // ex: ["1 M.Baixo","2 Baixo","3 MĂ©dio","4 Alto","5 M.Alto"]
      splitArea: { show: true },
      axisLabel: { color: '#1f2937' }
    },
    yAxis: {
      type: 'category',
      data: {{Y_LABELS_JSON}}, // ex: ["1 M.Baixa","2 Baixa","3 MĂ©dia","4 Alta","5 M.Alta"]
      splitArea: { show: true },
      axisLabel: { color: '#1f2937' }
    },
    visualMap: {
      min: 0,
      max: {{MAX_VALUE}},
      calculable: true,
      orient: 'horizontal',
      left: 'center',
      bottom: 0,
      inRange: { color: ['#e0f2fe', '#0b5394', '#cc0000'] }
    },
    series: [{
      name: '{{TITULO_PAINEL}}',
      type: 'heatmap',
      data: {{HEATMAP_DATA_JSON}}, // ex: [[0,0,3],[1,0,5],...] -> [xIdx, yIdx, valor]
      label: { show: true, color: '#fff' },
      emphasis: { itemStyle: { shadowBlur: 10 } }
    }]
  });
  window.addEventListener('resize', () => chart.resize());
})();
</script>
