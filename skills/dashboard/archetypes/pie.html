<!-- Archetype: Pie/Donut Chart — distribuição em fatias. -->
<!-- Use para "chamados por fornecedor", "% por status", "% por etiqueta". -->
<!-- Donut (com hole) é preferível a pie sólido — leitura mais limpa, espaço pra total no centro. -->

<div class="card" style="background:#fff;border-radius:8px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.08);grid-column:span 6">
  <div style="font-size:14px;font-weight:600;color:#1f2937;margin-bottom:12px">{{TITULO_PAINEL}}</div>
  <div id="{{CHART_ID}}" style="width:100%;height:340px"></div>
</div>

<script>
(function() {
  const el = document.getElementById('{{CHART_ID}}');
  const chart = echarts.init(el);
  chart.setOption({
    tooltip: { trigger: 'item', formatter: '{b}: {c} ({d}%)' },
    legend: { orient: 'vertical', right: 0, top: 'middle', textStyle: { color: '#1f2937' } },
    color: ['#0b5394','#45818e','#6aa84f','#f1c232','#a64d79','#cc0000','#6d9eeb','#2986cc','#8e7cc3'],
    series: [{
      name: '{{TITULO_PAINEL}}',
      type: 'pie',
      radius: ['45%', '70%'], // donut
      center: ['35%', '50%'],
      avoidLabelOverlap: true,
      itemStyle: { borderRadius: 4, borderColor: '#fff', borderWidth: 2 },
      label: { show: true, formatter: '{b}\n{d}%', color: '#1f2937' },
      data: {{PIE_DATA_JSON}} // ex: [{name:"CMFlex", value:12}, {name:"Oracle", value:8}]
    }]
  });
  window.addEventListener('resize', () => chart.resize());
})();
</script>
