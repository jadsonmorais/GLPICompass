<!-- Archetype: Stacked Bar — 2 dimensões em um gráfico. -->
<!-- Use para "categoria × hotel", "status × grupo", "fornecedor × prioridade". -->
<!-- Eixo X = uma dimensão (hotel/grupo); barras empilhadas = a outra (categoria/status). -->
<!-- Quando tiver muitas categorias (>6), prefira heatmap. -->

<div class="card" style="background:#fff;border-radius:8px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.08);grid-column:span 12">
  <div style="font-size:14px;font-weight:600;color:#1f2937;margin-bottom:12px">{{TITULO_PAINEL}}</div>
  <div id="{{CHART_ID}}" style="width:100%;height:380px"></div>
</div>

<script>
(function() {
  const el = document.getElementById('{{CHART_ID}}');
  const chart = echarts.init(el);
  chart.setOption({
    grid: { top: 48, right: 24, bottom: 64, left: 56 },
    legend: { top: 0, textStyle: { color: '#1f2937' } },
    tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
    color: ['#0b5394','#45818e','#6aa84f','#f1c232','#a64d79','#cc0000','#6d9eeb','#2986cc','#8e7cc3'],
    xAxis: {
      type: 'category',
      data: {{X_LABELS_JSON}}, // ex: ["Hotel CE","Hotel BA","Hotel RN"] — categorias do eixo X (hotéis)
      axisLabel: { color: '#1f2937', interval: 0, rotate: 30 }
    },
    yAxis: { type: 'value', axisLabel: { color: '#6b7280' } },
    series: {{SERIES_JSON}}
    // SERIES_JSON exemplo (uma série por categoria empilhada):
    // [
    //   { name: "Sistemas",      type: "bar", stack: "total", emphasis:{focus:"series"}, data: [12, 8, 5] },
    //   { name: "Infra",         type: "bar", stack: "total", emphasis:{focus:"series"}, data: [4, 6, 3] },
    //   { name: "Hardware",      type: "bar", stack: "total", emphasis:{focus:"series"}, data: [2, 1, 7] }
    // ]
  });
  window.addEventListener('resize', () => chart.resize());
})();
</script>
